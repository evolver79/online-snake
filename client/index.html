<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SNAKE RUNNER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
    }

    #canvas-container {
      /* Maintain 16:9 aspect ratio */
      width: min(100vw, 177.78vh);
      height: min(100vh, 56.25vw);
      position: relative;
    }

    /* ── Overlay — start / game over ───────────────────────────────── */
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      pointer-events: none;
      font-family: 'Share Tech Mono', monospace;
      color: #33ff66;
    }

    #overlay.hidden { display: none; }

    #overlay-title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(20px, 5vw, 42px);
      letter-spacing: 10px;
      text-shadow: 0 0 10px #33ff66, 0 0 30px #22cc44;
      margin-bottom: 12px;
    }

    #overlay-score {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(32px, 8vw, 70px);
      letter-spacing: 4px;
      text-shadow: 0 0 12px #33ff66, 0 0 36px #22cc44;
      line-height: 1;
      margin-bottom: 10px;
      min-height: 1em;
    }

    #overlay-sub {
      font-size: clamp(8px, 1.6vw, 13px);
      letter-spacing: 5px;
      opacity: 0.7;
      animation: blink 1.4s ease-in-out infinite;
      min-height: 1.2em;
    }

    @keyframes blink {
      0%, 100% { opacity: 0.7; }
      50%       { opacity: 0.15; }
    }

    /* ── Name entry ─────────────────────────────────────────────────── */
    #name-entry {
      margin-top: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      pointer-events: all;
    }

    #name-entry.hidden { display: none; }

    #name-label {
      font-size: clamp(7px, 1.3vw, 10px);
      letter-spacing: 4px;
      opacity: 0.5;
    }

    #name-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(51, 255, 102, 0.4);
      color: #33ff66;
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(12px, 2.5vw, 18px);
      letter-spacing: 6px;
      text-align: center;
      width: clamp(120px, 30vw, 180px);
      outline: none;
      text-transform: uppercase;
      caret-color: #33ff66;
    }

    #name-input::placeholder { opacity: 0.25; }
    #name-input:focus { border-bottom-color: #33ff66; }

    #name-error {
      font-size: clamp(7px, 1.2vw, 10px);
      letter-spacing: 3px;
      color: #ff4466;
      min-height: 1.2em;
    }

    #name-submit {
      background: transparent;
      border: 1px solid rgba(51, 255, 102, 0.35);
      color: rgba(51, 255, 102, 0.6);
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(7px, 1.2vw, 10px);
      letter-spacing: 4px;
      padding: 5px 18px;
      cursor: pointer;
      pointer-events: all;
      transition: color 0.15s, border-color 0.15s;
    }

    #name-submit:hover { color: #33ff66; border-color: rgba(51,255,102,0.7); }

    /* ── Leaderboard ────────────────────────────────────────────────── */
    #leaderboard {
      position: absolute;
      bottom: 12%;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(7px, 1.4vw, 11px);
      letter-spacing: 2px;
      color: rgba(51, 255, 102, 0.5);
      text-align: center;
      pointer-events: none;
      min-width: clamp(160px, 35vw, 220px);
    }

    #leaderboard.hidden { display: none; }

    #leaderboard-title {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(6px, 1.1vw, 9px);
      letter-spacing: 5px;
      opacity: 0.4;
      margin-bottom: 4px;
    }

    #leaderboard-rows { list-style: none; }

    #leaderboard-rows li {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      line-height: 2;
    }

    #leaderboard-rows li.highlight { color: #33ff66; text-shadow: 0 0 8px #33ff66; }
    #leaderboard-rows .lb-rank  { opacity: 0.3; min-width: 2ch; text-align: right; }
    #leaderboard-rows .lb-name  { flex: 1; text-align: left; }
    #leaderboard-rows .lb-score { font-variant-numeric: tabular-nums; }

    /* ── Controls hint ──────────────────────────────────────────────── */
    #controls-hint {
      position: absolute;
      top: 8%;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(6px, 1.1vw, 9px);
      letter-spacing: 3px;
      color: rgba(51, 255, 102, 0.3);
      text-align: center;
      pointer-events: none;
      white-space: nowrap;
    }

    /* ── Toast notifications ────────────────────────────────────────── */
    #toast-container {
      position: absolute;
      top: 8%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      pointer-events: none;
      z-index: 10;
    }

    .toast {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(7px, 1.2vw, 10px);
      letter-spacing: 3px;
      color: #ffaa00;
      text-shadow: 0 0 8px #ffaa00;
      white-space: nowrap;
      animation: toast-fade 3.5s ease forwards;
    }

    @keyframes toast-fade {
      0%   { opacity: 0; transform: translateY(-4px); }
      10%  { opacity: 1; transform: translateY(0); }
      75%  { opacity: 1; }
      100% { opacity: 0; }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="canvas-container">
    <div id="overlay">
      <div id="overlay-title">SNAKE RUNNER</div>
      <div id="overlay-score"></div>
      <p id="overlay-sub">PRESS ANY KEY TO START</p>
      <div id="name-entry" class="hidden">
        <div id="name-label">ENTER YOUR NAME</div>
        <input id="name-input" type="text" maxlength="12" placeholder="PLAYER" autocomplete="off" spellcheck="false" />
        <div id="name-error"></div>
        <button id="name-submit">SUBMIT</button>
      </div>
    </div>

    <div id="leaderboard" class="hidden">
      <div id="leaderboard-title">TOP SCORES</div>
      <ul id="leaderboard-rows"></ul>
    </div>

    <div id="controls-hint">SPACE / ↑ JUMP &nbsp;&nbsp; ↓ SLIDE</div>
    <div id="toast-container"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
