<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SNAKE DUNGEON</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
    }

    #canvas-container {
      width: min(100vw, 177.78vh);
      height: min(100vh, 56.25vw);
      position: relative;
      cursor: pointer;
    }

    /* ── Overlay ─────────────────────────────────────────────────────── */
    #overlay {
      position: absolute;
      inset: 0 0 50px 0;   /* leave HUD strip uncovered */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      font-family: 'Share Tech Mono', monospace;
      color: #22cc44;
      background: rgba(8,6,18,0.72);
    }

    #overlay.hidden { display: none; }

    #overlay-title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(18px, 4.5vw, 38px);
      letter-spacing: 8px;
      text-shadow: 0 0 10px #22cc44, 0 0 28px #116622;
      margin-bottom: 10px;
    }

    #overlay-score {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(28px, 7vw, 60px);
      letter-spacing: 4px;
      text-shadow: 0 0 12px #22cc44, 0 0 32px #116622;
      line-height: 1;
      margin-bottom: 10px;
      min-height: 1em;
    }

    #overlay-sub {
      font-size: clamp(7px, 1.5vw, 11px);
      letter-spacing: 5px;
      opacity: 0.65;
      animation: blink 1.4s ease-in-out infinite;
      min-height: 1.2em;
    }

    @keyframes blink { 0%,100%{opacity:.65} 50%{opacity:.12} }

    /* ── Name entry ───────────────────────────────────────────────────── */
    #name-entry {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      pointer-events: all;
    }

    #name-entry.hidden { display: none; }

    #name-label {
      font-size: clamp(7px, 1.2vw, 9px);
      letter-spacing: 4px;
      opacity: 0.45;
    }

    #name-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(34,204,68,0.4);
      color: #22cc44;
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(12px, 2.2vw, 16px);
      letter-spacing: 6px;
      text-align: center;
      width: clamp(110px, 28vw, 170px);
      outline: none;
      text-transform: uppercase;
      caret-color: #22cc44;
    }

    #name-input::placeholder { opacity: 0.22; }
    #name-input:focus { border-bottom-color: #22cc44; }

    #name-error {
      font-size: clamp(6px, 1.1vw, 9px);
      letter-spacing: 3px;
      color: #ff4455;
      min-height: 1.2em;
    }

    #name-submit {
      background: transparent;
      border: 1px solid rgba(34,204,68,0.3);
      color: rgba(34,204,68,0.55);
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(6px, 1.1vw, 9px);
      letter-spacing: 4px;
      padding: 5px 16px;
      cursor: pointer;
      pointer-events: all;
      transition: color 0.15s, border-color 0.15s;
    }

    #name-submit:hover { color: #22cc44; border-color: rgba(34,204,68,0.65); }

    /* ── Leaderboard ──────────────────────────────────────────────────── */
    #leaderboard {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(6px, 1.3vw, 10px);
      letter-spacing: 2px;
      color: rgba(34,204,68,0.45);
      text-align: center;
      pointer-events: all;
      cursor: pointer;
      min-width: clamp(150px, 32vw, 210px);
    }

    #leaderboard.hidden { display: none; }

    #leaderboard-title {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(5px, 1vw, 8px);
      letter-spacing: 5px;
      opacity: 0.35;
      margin-bottom: 4px;
    }

    #leaderboard-rows { list-style: none; }

    #leaderboard-rows li {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      line-height: 2;
    }

    #leaderboard-rows li.highlight { color: #22cc44; text-shadow: 0 0 6px #22cc44; }
    #leaderboard-rows .lb-rank  { opacity: 0.28; min-width: 2ch; text-align: right; }
    #leaderboard-rows .lb-name  { flex: 1; text-align: left; }
    #leaderboard-rows .lb-score { font-variant-numeric: tabular-nums; }

    /* ── Controls hint ────────────────────────────────────────────────── */
    #controls-hint {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(5px, 1vw, 8px);
      letter-spacing: 3px;
      color: rgba(34,204,68,0.28);
      white-space: nowrap;
      pointer-events: none;
    }

    /* ── Toasts ───────────────────────────────────────────────────────── */
    #toast-container {
      position: absolute;
      top: 4%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      pointer-events: none;
      z-index: 10;
    }

    .toast {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(6px, 1.1vw, 9px);
      letter-spacing: 3px;
      color: #ffaa00;
      text-shadow: 0 0 6px #ffaa00;
      white-space: nowrap;
      animation: toast-fade 3.5s ease forwards;
    }

    @keyframes toast-fade {
      0%{opacity:0;transform:translateY(-4px)}
      10%{opacity:1;transform:translateY(0)}
      75%{opacity:1}
      100%{opacity:0}
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="canvas-container">

    <div id="overlay">
      <div id="overlay-title">SNAKE DUNGEON</div>
      <div id="overlay-score"></div>
      <p id="overlay-sub">PRESS ANY KEY TO START</p>
      <div id="name-entry" class="hidden">
        <div id="name-label">ENTER YOUR NAME</div>
        <input id="name-input" type="text" maxlength="12" placeholder="PLAYER" autocomplete="off" spellcheck="false" />
        <div id="name-error"></div>
        <button id="name-submit">SUBMIT</button>
      </div>
    </div>

    <div id="leaderboard" class="hidden">
      <div id="leaderboard-title">TOP SCORES</div>
      <ul id="leaderboard-rows"></ul>
    </div>

    <div id="controls-hint">WASD / ARROWS  —  KILL ALL ENEMIES  —  REACH THE EXIT  —  TAB: SCORES</div>
    <div id="toast-container"></div>

  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
