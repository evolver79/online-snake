<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SNAKE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Share Tech Mono', 'Courier New', monospace;
    }

    #canvas-container {
      width: 100vw;
      height: 100vh;
    }

    #ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      color: #00ffaa;
    }

    /* ── Score display — top right ─────────────────────────────────── */
    #score-display {
      position: absolute;
      top: 24px;
      right: 28px;
      text-align: right;
      font-family: 'Share Tech Mono', monospace;
      font-size: 15px;
      letter-spacing: 2px;
      text-shadow: 0 0 8px #00ffaa, 0 0 20px #00ffaa;
      line-height: 1.9;
    }

    #score-display > div {
      display: flex;
      gap: 16px;
      justify-content: flex-end;
    }

    .score-label { opacity: 0.5; }

    #score, #high-score, #speed-mult {
      font-variant-numeric: tabular-nums;
      min-width: 3ch;
      text-align: right;
    }

    #speed-line {
      font-size: 12px;
      opacity: 0.55;
      margin-top: 2px;
    }

    #combo-line { margin-top: 2px; font-size: 13px; }
    #combo-mult {
      color: #ffaa00;
      text-shadow: 0 0 8px #ffaa00, 0 0 20px #ffaa00;
      font-variant-numeric: tabular-nums;
      min-width: 3ch;
      text-align: right;
    }

    /* ── Center panel ──────────────────────────────────────────────── */
    #center-panel {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    #game-title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 72px;
      letter-spacing: 16px;
      text-transform: uppercase;
      text-shadow:
        0 0 12px #00ffaa,
        0 0 35px #00ffaa,
        0 0 70px #00cc88,
        0 0 120px #009966;
      margin-bottom: 28px;
    }

    /* Game-over shrinks "GAME OVER" to a subtitle */
    #game-title.game-over {
      font-size: 13px;
      letter-spacing: 7px;
      font-weight: 700;
      text-shadow: 0 0 6px #00ffaa, 0 0 14px #00cc88;
      margin-bottom: 12px;
    }

    /* Large score — the emotional payload on game over */
    #game-score-big {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 88px;
      letter-spacing: 6px;
      text-shadow:
        0 0 14px #00ffaa,
        0 0 42px #00ffaa,
        0 0 80px #00cc88;
      line-height: 1;
      margin-bottom: 16px;
    }

    /* "NEW BEST" badge — gold, appears on new record */
    #new-best-badge {
      font-size: 11px;
      letter-spacing: 6px;
      color: #ffd700;
      text-shadow: 0 0 8px #ffd700, 0 0 22px #ffd700;
      margin-bottom: 16px;
    }

    #prompt {
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      letter-spacing: 5px;
      opacity: 0.8;
      animation: blink 1.4s ease-in-out infinite;
      min-height: 1.3em;
    }

    /* Cooldown bar — grows left-to-right over 2 s before key works */
    #cooldown-bar {
      width: 160px;
      height: 2px;
      background: rgba(0, 255, 170, 0.10);
      margin: 18px auto 0;
      position: relative;
      overflow: hidden;
    }

    #cooldown-bar::after {
      content: '';
      position: absolute;
      left: 0; top: 0;
      height: 100%;
      width: 0;
      background: #00ffaa;
      box-shadow: 0 0 6px #00ffaa;
    }

    #cooldown-bar.active::after {
      animation: cooldown-fill 2s linear forwards;
    }

    @keyframes cooldown-fill {
      from { width: 0; }
      to   { width: 100%; }
    }

    /* ── Demo badge — top left ─────────────────────────────────────── */
    #demo-badge {
      position: absolute;
      top: 24px;
      left: 28px;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 5px;
      color: #ff2255;
      text-shadow: 0 0 8px #ff2255, 0 0 20px #ff2255;
      animation: blink 0.9s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 0.8; }
      50%       { opacity: 0.15; }
    }

    /* High score flashes gold when a new record is set */
    @keyframes best-flash {
      0%, 100% { color: #00ffaa; text-shadow: 0 0 8px #00ffaa, 0 0 20px #00ffaa; }
      50%       { color: #ffd700; text-shadow: 0 0 14px #ffd700, 0 0 34px #ffd700; }
    }

    .best-new { animation: best-flash 0.25s ease-in-out 4; }

    /* ── Floating score labels ─────────────────────────────────────── */
    .score-float {
      position: fixed;
      pointer-events: none;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 2px;
      color: #00ffaa;
      text-shadow: 0 0 8px #00ffaa, 0 0 18px #00ffaa;
      white-space: nowrap;
      z-index: 100;
      transform: translateX(-50%);
      animation: score-float-rise 0.72s ease-out forwards;
    }

    .score-float.combo {
      font-size: 22px;
      color: #ffaa00;
      text-shadow: 0 0 10px #ffaa00, 0 0 26px #ffaa00;
    }

    @keyframes score-float-rise {
      0%   { opacity: 1; transform: translateX(-50%) translateY(0); }
      15%  { opacity: 1; }
      100% { opacity: 0; transform: translateX(-50%) translateY(-62px); }
    }

    /* Score pulse when points land in the HUD */
    #score { display: inline-block; }

    @keyframes score-pop {
      0%   { transform: scale(1); }
      30%  { transform: scale(1.55); color: #00ffdd;
             text-shadow: 0 0 18px #00ffaa, 0 0 40px #00ffaa; }
      100% { transform: scale(1); }
    }

    .score-pop { animation: score-pop 0.28s ease-out forwards; }

    /* ── Mechanics hint — bottom right ────────────────────────────── */
    #mechanics-hint {
      position: fixed;
      bottom: 16px;
      right: 22px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(0, 255, 170, 0.28);
      text-align: right;
      line-height: 2;
      pointer-events: none;
    }

    #mechanics-hint .hint-portal { color: rgba(204, 68, 255, 0.55); }
    #mechanics-hint .hint-combo  { color: rgba(255, 170,   0, 0.55); }
    #mechanics-hint .hint-wall   { color: rgba(255, 102,   0, 0.65); }

    /* ── 2D / 3D view toggle — bottom left ────────────────────────── */
    #view-toggle {
      position: fixed;
      bottom: 18px;
      left: 22px;
      background: transparent;
      border: 1px solid rgba(0, 255, 170, 0.20);
      color: rgba(0, 255, 170, 0.40);
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      padding: 5px 11px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      pointer-events: all;
    }

    #view-toggle:hover {
      color: #00ffaa;
      border-color: rgba(0, 255, 170, 0.5);
    }

    .hidden { display: none !important; }

    /* ── Name entry — game over ────────────────────────────────────── */
    #name-entry {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    #name-label {
      font-size: 10px;
      letter-spacing: 4px;
      opacity: 0.5;
    }

    #name-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(0, 255, 170, 0.4);
      color: #00ffaa;
      font-family: 'Share Tech Mono', monospace;
      font-size: 18px;
      letter-spacing: 6px;
      text-align: center;
      width: 180px;
      outline: none;
      text-transform: uppercase;
      caret-color: #00ffaa;
    }

    #name-input::placeholder { opacity: 0.25; letter-spacing: 3px; }

    #name-input:focus {
      border-bottom-color: #00ffaa;
      box-shadow: 0 2px 12px rgba(0, 255, 170, 0.2);
    }

    #name-error {
      font-size: 10px;
      letter-spacing: 3px;
      color: #ff4466;
      text-shadow: 0 0 8px #ff4466;
      min-height: 1.2em;
    }

    #name-submit {
      background: transparent;
      border: 1px solid rgba(0, 255, 170, 0.35);
      color: rgba(0, 255, 170, 0.6);
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 4px;
      padding: 6px 20px;
      cursor: pointer;
      pointer-events: all;
      transition: color 0.15s, border-color 0.15s;
    }

    #name-submit:hover {
      color: #00ffaa;
      border-color: rgba(0, 255, 170, 0.7);
    }

    /* ── Leaderboard panel ─────────────────────────────────────────── */
    #leaderboard {
      position: fixed;
      top: 50%;
      right: 28px;
      transform: translateY(-50%);
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(0, 255, 170, 0.55);
      text-align: right;
      pointer-events: none;
      line-height: 2;
      min-width: 160px;
    }

    #leaderboard-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 9px;
      letter-spacing: 5px;
      opacity: 0.4;
      margin-bottom: 6px;
    }

    #leaderboard-rows { list-style: none; }

    #leaderboard-rows li {
      display: flex;
      justify-content: space-between;
      gap: 16px;
    }

    #leaderboard-rows li.highlight {
      color: #00ffaa;
      text-shadow: 0 0 8px #00ffaa;
    }

    #leaderboard-rows .lb-rank { opacity: 0.35; min-width: 2ch; }
    #leaderboard-rows .lb-name { flex: 1; text-align: left; }
    #leaderboard-rows .lb-score { font-variant-numeric: tabular-nums; }

    /* ── Toast notifications ───────────────────────────────────────── */
    #toast-container {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      pointer-events: none;
      z-index: 200;
    }

    .toast {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      color: #ffaa00;
      text-shadow: 0 0 8px #ffaa00, 0 0 20px #ffaa00;
      white-space: nowrap;
      animation: toast-in-out 3.5s ease forwards;
    }

    @keyframes toast-in-out {
      0%   { opacity: 0; transform: translateY(-6px); }
      10%  { opacity: 1; transform: translateY(0); }
      75%  { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="ui">
    <div id="demo-badge" class="hidden">DEMO</div>
    <div id="score-display">
      <div><span class="score-label">SCORE</span><span id="score">0</span></div>
      <div><span class="score-label">BEST</span><span id="high-score">0</span></div>
      <div id="speed-line" class="hidden"><span class="score-label">SPD</span><span id="speed-mult">×1.0</span></div>
      <div id="combo-line" class="hidden"><span class="score-label">COMBO</span><span id="combo-mult">×2</span></div>
    </div>
    <div id="center-panel">
      <h1 id="game-title">SNAKE</h1>
      <div id="game-score-big" class="hidden"></div>
      <p id="new-best-badge" class="hidden">NEW BEST</p>
      <p id="prompt">PRESS ANY KEY TO START</p>
      <div id="cooldown-bar" class="hidden"></div>
      <div id="name-entry" class="hidden">
        <div id="name-label">ENTER YOUR NAME</div>
        <input id="name-input" type="text" maxlength="12" placeholder="PLAYER" autocomplete="off" spellcheck="false" />
        <div id="name-error"></div>
        <button id="name-submit">SUBMIT</button>
      </div>
    </div>
  </div>
  <div id="leaderboard" class="hidden">
    <div id="leaderboard-title">TOP SCORES</div>
    <ul id="leaderboard-rows"></ul>
  </div>
  <div id="toast-container"></div>
  <div id="mechanics-hint">
    <div><span class="hint-portal">○</span> PORTAL — warp between rings</div>
    <div><span class="hint-combo">×</span> COMBO — chain eats for bonus</div>
    <div><span class="hint-wall">▪</span> WALLS — instant death</div>
  </div>
  <button id="view-toggle">2D</button>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
